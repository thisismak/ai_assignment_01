<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search Results</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
    }
    .results-container {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 80%;
      max-width: 1200px;
      text-align: center;
      margin-top: 20px;
    }
    #image-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      margin-top: 20px;
    }
    #image-gallery div {
      text-align: center;
    }
    img {
      max-width: 200px;
      height: auto;
      border-radius: 4px;
    }
    .results-container a {
      display: inline-block;
      margin: 10px;
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 4px;
    }
    .results-container a:hover {
      background-color: #0056b3;
    }
    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="results-container">
    <h2>Search Results</h2>
    <div id="image-gallery"></div>
    <p>
      <a href="/logs">Download Log</a> |
      <a href="/search">New Search</a> |
      <a href="/logout">Logout</a>
    </p>
    <p id="error" class="error"></p>
  </div>
  <script>
    async function loadImages() {
      const token = sessionStorage.getItem('token');
      const gallery = document.getElementById('image-gallery');
      const errorEl = document.getElementById('error');

      errorEl.textContent = '';
      gallery.innerHTML = '';

      if (!token) {
        errorEl.textContent = 'No token found. Please login.';
        setTimeout(() => { window.location.href = '/login'; }, 2000);
        return;
      }

      try {
        const response = await fetch('/api/images', {
          headers: { 'Authorization': token },
        });
        const images = await response.json();

        if (!response.ok) {
          errorEl.textContent = images.error || 'Failed to load images';
          return;
        }

        if (images.length === 0) {
          errorEl.textContent = 'No images found for your searches.';
          return;
        }

        images.forEach(img => {
          const div = document.createElement('div');
          div.innerHTML = `
            <img src="${img.src}" alt="${img.alt || 'No alt text'}" />
            <p>${img.alt || 'No alt text'}</p>
          `;
          gallery.appendChild(div);
        });
      } catch (err) {
        errorEl.textContent = 'Server error';
        console.error('Fetch images error:', err);
      }
    }

    window.onload = loadImages;
  </script>
</body>
</html>
